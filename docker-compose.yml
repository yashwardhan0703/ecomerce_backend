version: "3.9"

services:

  backend_blue:
    build: .
    container_name: backend_blue
    ports:
      - "5001:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  backend_green:
    build: .
    container_name: backend_green
    ports:
      - "5002:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:
